<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Auto Studio</title>

<style>
body{
    font-family: 'Segoe UI', Arial;
    background:#0b1220;
    margin:0;
}

.container{
    max-width:500px;
    margin:auto;
    padding:20px;
}

.title{
    color:white;
    text-align:center;
    margin-bottom:20px;
}

.card{
    background:#111827;
    padding:20px;
    border-radius:12px;
    color:white;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

.save{background:#2563eb;color:white;}
.print{background:#f59e0b;color:white;}
.whatsapp{background:#22c55e;color:white;}

#receipt{
    display:none;
}

/* RECIBO PREMIUM */
.receipt{
    max-width:650px;
    margin:auto;
    background:white;
    padding:35px;
    border-radius:12px;
    box-shadow:0 15px 40px rgba(0,0,0,0.25);
}

.top{
    display:flex;
    justify-content:space-between;
}

.business{
    font-size:20px;
    font-weight:bold;
}

.line{
    border-bottom:1px solid #ddd;
    margin:20px 0;
}

.row{
    display:flex;
    justify-content:space-between;
}

.total{
    font-size:24px;
    font-weight:bold;
    text-align:right;
}

/* PRINT PERFECTO */
@media print{
    body *{
        visibility:hidden;
    }
    #receipt, #receipt *{
        visibility:visible;
    }
    #receipt{
        position:absolute;
        top:0;
        left:0;
        width:100%;
        padding:40px;
    }
}
</style>
</head>

<body>

<div class="container">

<div class="title">
<h2>🚗 Car Auto Studio</h2>
<p>Receipt Generator</p>
</div>

<div class="card">
<input type="text" id="name" placeholder="Client name">
<input type="number" id="amount" placeholder="Amount">

<button class="save" onclick="create()">Generate Receipt</button>
<button class="print" onclick="printR()">Print</button>
<button class="whatsapp" onclick="wa()">Send via WhatsApp</button>
</div>

<div id="receipt"></div>

</div>

<script>

let count = 1;

function create(){

let name = document.getElementById("name").value;
let amount = document.getElementById("amount").value;

if(!name || !amount){
alert("Fill all fields");
return;
}

let date = new Date().toLocaleString();

document.getElementById("receipt").style.display="block";

document.getElementById("receipt").innerHTML = `
<div class="receipt">

<div class="top">
<div>
<div class="business">Car Auto Studio</div>
<div>20 Prescott St, Jersey City</div>
<div>201-658-7295</div>
</div>

<div style="text-align:right;">
<strong>Receipt</strong><br>
REC-${count}
</div>
</div>

<div class="line"></div>

<p><strong>Date:</strong> ${date}</p>
<p><strong>Client:</strong> ${name}</p>

<div class="line"></div>

<div class="row">
<span>Auto Service</span>
<span>$${amount}</span>
</div>

<div class="line"></div>

<div class="total">Total: $${amount}</div>

<p style="text-align:center;margin-top:30px;">
Thank you for your business
</p>

</div>
`;

count++;

}

function printR(){
window.print();
}

function wa(){
let text = document.getElementById("receipt").innerText;
window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
}

</script>

</body>
</html>
