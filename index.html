<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Auto Studio</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0b1220;
}

/* PAGE */
.container{
    max-width:500px;
    margin:auto;
    padding:20px;
}

/* RECEIPT */
.receipt{
    background:white;
    border-radius:14px;
    padding:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
}

.title{
    font-size:22px;
    font-weight:bold;
}

.small{
    font-size:13px;
    color:#555;
}

/* LINES */
.line{
    border-bottom:1px solid #ddd;
    margin:15px 0;
}

/* ROW */
.row{
    display:flex;
    justify-content:space-between;
    margin:8px 0;
}

/* EDITABLE */
.edit{
    border-bottom:1px dashed #aaa;
    min-width:120px;
    outline:none;
}

/* TOTAL */
.total{
    font-size:22px;
    font-weight:bold;
}

/* BUTTONS */
button{
    width:100%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    font-weight:bold;
    font-size:15px;
}

.print{background:#f59e0b;color:white;}
.whatsapp{background:#22c55e;color:white;}
.sms{background:#3b82f6;color:white;}

/* PRINT FIX */
@media print{
    body{background:white;}
    body *{visibility:hidden;}
    #printArea, #printArea *{visibility:visible;}

    #printArea{
        position:absolute;
        top:0;
        left:0;
        width:100%;
        padding:40px;
    }
}
</style>
</head>

<body>

<div class="container">

<div class="receipt" id="printArea">

<!-- HEADER -->
<div class="header">
<div>
<div class="title">🚗 Car Auto Studio</div>
<div class="small">20 Prescott St, Jersey City</div>
<div class="small">201-658-7295</div>
</div>

<div style="text-align:right">
<b>Receipt</b><br>
<div id="receipt" class="edit" contenteditable="true"></div>
</div>
</div>

<div class="line"></div>

<!-- INFO -->
<div class="row">
<div><b>Date:</b></div>
<div id="date" class="edit" contenteditable="true"></div>
</div>

<div class="row">
<div><b>Client:</b></div>
<div id="client" class="edit" contenteditable="true"></div>
</div>

<div class="row">
<div><b>Vehicle:</b></div>
<div id="car" class="edit" contenteditable="true"></div>
</div>

<div class="line"></div>

<!-- SERVICE -->
<div class="row">
<div>Auto Service</div>
<div id="amount" class="edit" contenteditable="true"></div>
</div>

<div class="line"></div>

<!-- TOTAL -->
<div class="row total">
<div>Total:</div>
<div id="total" class="edit" contenteditable="true"></div>
</div>

<p style="text-align:center;margin-top:25px;color:#555">
Thank you for your business
</p>

</div>

<!-- BUTTONS -->
<button class="print" onclick="window.print()">Print Receipt</button>
<button class="whatsapp" onclick="sendWhatsApp()">Send WhatsApp</button>
<button class="sms" onclick="sendSMS()">Send SMS</button>

</div>

<script>

/* GET TEXT */
function getText(id){
    return document.getElementById(id).innerText || "";
}

/* WHATSAPP */
function sendWhatsApp(){
    let msg =
`Car Auto Studio
Receipt: ${getText("receipt")}
Date: ${getText("date")}
Client: ${getText("client")}
Vehicle: ${getText("car")}
Total: ${getText("total")}`;

    window.open("https://wa.me/?text=" + encodeURIComponent(msg));
}

/* SMS */
function sendSMS(){
    let msg =
`Car Auto Studio
Receipt: ${getText("receipt")}
Date: ${getText("date")}
Client: ${getText("client")}
Vehicle: ${getText("car")}
Total: ${getText("total")}`;

    window.location.href = "sms:?body=" + encodeURIComponent(msg);
}

</script>

</body>
</html>
