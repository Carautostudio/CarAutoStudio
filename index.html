<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Auto Studio</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:white;
}

/* RECEIPT */
.receipt{
    max-width:700px;
    margin:40px auto;
    padding:40px;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
}

.title{
    font-size:24px;
    font-weight:bold;
}

.small{
    color:#555;
    font-size:14px;
}

/* LINES */
.line{
    border-bottom:1px solid #ddd;
    margin:15px 0;
}

/* ROWS */
.row{
    display:flex;
    justify-content:space-between;
    margin:8px 0;
    font-size:16px;
}

/* TOTAL */
.total{
    font-size:22px;
    font-weight:bold;
}

/* EDITABLE */
.edit{
    border-bottom:1px dashed #999;
    min-width:120px;
    display:inline-block;
}

/* PRINT PERFECT */
@media print{
    body{
        margin:0;
    }

    .receipt{
        margin:0;
        padding:40px;
    }
}
</style>
</head>

<body>

<div class="receipt">

<div class="header">
<div>
<div class="title">🚗 Car Auto Studio</div>
<div class="small">20 Prescott St, Jersey City</div>
<div class="small">201-658-7295</div>
</div>

<div>
<b>Receipt</b><br>
REC-____
</div>
</div>

<div class="line"></div>

<div class="row">
<div><b>Date:</b></div>
<div class="edit" contenteditable="true"></div>
</div>

<div class="row">
<div><b>Client:</b></div>
<div class="edit" contenteditable="true"></div>
</div>

<div class="row">
<div><b>Car:</b></div>
<div class="edit" contenteditable="true"></div>
</div>

<div class="line"></div>

<div class="row">
<div>Auto Service</div>
<div class="edit" contenteditable="true"></div>
</div>

<div class="line"></div>

<div class="row total">
<div>Total:</div>
<div class="edit" contenteditable="true"></div>
</div>

<p style="text-align:center;margin-top:40px;color:#555">
Thank you for your business
</p>

</div>

</body>
</html>
