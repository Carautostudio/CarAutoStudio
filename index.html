<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Auto Studio</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  margin:0;
}

.header{
  text-align:center;
  padding:20px;
  background:#020617;
  font-size:22px;
  font-weight:bold;
}

.container{
  padding:20px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:8px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  font-size:16px;
  font-weight:bold;
  margin-top:10px;
}

.save{
  background:#3b82f6;
  color:white;
}

.print{
  background:#f59e0b;
  color:white;
}

.whatsapp{
  background:#25D366;
  color:white;
}
</style>
</head>

<body>

<div class="header">
🚗 Car Auto Studio  
<br>
📍 20 Prescott St, Jersey City  
📞 201-658-7295
</div>

<div class="container">

<div class="card">
<h2>New Receipt</h2>

<input id="name" placeholder="Client name">
<input id="amount" placeholder="Amount">

<button class="save" onclick="save()">Save Receipt</button>
</div>

<div class="card">
<h2>Total: $<span id="total">0</span></h2>

<button class="print" onclick="window.print()">Print Receipt</button>

<button class="whatsapp" onclick="sendWhatsApp()">Send via WhatsApp</button>
</div>

</div>

<script>
let total = 0;

function save(){
  let amount = document.getElementById("amount").value;
  if(amount){
    total += parseFloat(amount);
    document.getElementById("total").innerText = total;
  }
}

function sendWhatsApp(){
  let name = document.getElementById("name").value;
  let amount = document.getElementById("amount").value;

  let text = `Car Auto Studio Receipt
Client: ${name}
Amount: $${amount}
Address: 20 Prescott St, Jersey City
Phone: 2016587295`;

  window.open("https://wa.me/?text=" + encodeURIComponent(text));
}
</script>

</body>
</html>
