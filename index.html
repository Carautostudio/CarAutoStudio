<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Auto Studio</title>
<style>
body{
  font-family: Arial;
  background:#0f172a;
  margin:0;
  color:#fff;
}

.header{
  text-align:center;
  padding:20px;
  font-size:22px;
  font-weight:bold;
  background:#020617;
}

.container{
  padding:15px;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  font-size:16px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  font-size:16px;
  font-weight:bold;
  margin-top:10px;
}

.save{ background:#3b82f6; color:#fff; }
.print{ background:#f59e0b; }
.paid{ background:#22c55e; }

.total{
  font-size:20px;
  font-weight:bold;
}
</style>
</head>
<body>
<div class="header">🚗 Car Auto Studio</div>
<div class="container">
<div class="card">
<h3>New Receipt</h3>
<input id="name" placeholder="Client name">
<input id="amount" placeholder="Amount" type="number">
<button class="save" onclick="save()">Save Receipt</button>
</div>
<div class="card">
<div class="total">Total: $<span id="total">0</span></div>
<button class="print" onclick="printAll()">Print All</button>
</div>
</div>
<script>

let data = [];

function save(){
  let name = document.getElementById("name").value;
  let amount = document.getElementById("amount").value;

  if(!name || !amount) return alert("Fill all fields");

  let obj = {
    id: Date.now(),
    name,
    amount,
    status:"Pending"
  };

  data.push(obj);
  render();
}

function render(){
  let list = document.getElementById("list");
  list.innerHTML = "";

  let total = 0;

  data.forEach(d=>{
    total += Number(d.amount);

    list.innerHTML += `
    <div class="card">
      <b>${d.name} - $${d.amount}</b><br>
      Status: ${d.status}<br>
      <button class="paid" onclick="markPaid(${d.id})">Mark Paid</button>
      <button class="print" onclick="printOne(${d.id})">Print</button>
    </div>
    `;
  });

  document.getElementById("total").innerText = total;
}

function markPaid(id){
  data = data.map(d=>{
    if(d.id==id) d.status="Paid";
    return d;
  });
  render();
}

function printOne(id){
  let d = data.find(x=>x.id==id);

  let w = window.open("");

  w.document.write(`
  <html>
  <head>
  <title>Invoice</title>
  <style>
  body{font-family:Arial;padding:20px;}
  .box{max-width:400px;margin:auto;}
  </style>
wuu   </head>
  <body>
  <div class="box">
  <h2>Car Auto Studio</h2>
  <p>20 Prescot St, Jersey City NJ</p>
  <p>201-658-7295</p>
  <hr>
  <p>Client: ${d.name}</p>
  <p>Amount: $${d.amount}</p>
  <p>Status: ${d.status}</p>
  <p>Date: ${new Date().toLocaleDateString()}</p>
  <hr>
  <h3>Total: $${d.amount}</h3>
  <p>Thank you for your business</p>
  </div>
  </body>
  </html>
  `);
</script>
</body>
</html>
:::
