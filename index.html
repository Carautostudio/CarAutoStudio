<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Auto Studio</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto;
    background:linear-gradient(135deg,#0b1220,#111827);
}

.container{
    max-width:420px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    border-radius:16px;
    padding:20px;
    box-shadow:0 20px 50px rgba(0,0,0,0.4);
}

.header{
    display:flex;
    justify-content:space-between;
}

.title{
    font-size:22px;
    font-weight:700;
}

.small{
    color:#555;
    font-size:14px;
}

.phone{
    color:#2563eb;
    text-decoration:none;
}

.hr{
    border-bottom:1px solid #e5e7eb;
    margin:15px 0;
}

.row{
    display:flex;
    justify-content:space-between;
    margin:6px 0;
}

.label{
    font-weight:600;
}

.total{
    font-size:22px;
    font-weight:700;
}

.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    font-weight:600;
    margin-top:10px;
}

.print{background:#f59e0b;color:white;}
.whatsapp{background:#22c55e;color:white;}
.sms{background:#3b82f6;color:white;}

@media print{
    body{background:white;}
    body *{visibility:hidden;}
    #printArea, #printArea *{visibility:visible;}
    #printArea{
        position:absolute;
        top:0;
        left:0;
        width:100%;
        padding:40px;
    }
}
</style>
</head>

<body>

<div class="container">

<div class="card" id="printArea">

<div class="header">
<div>
<div class="title">🚗 Car Auto Studio</div>
<div class="small">20 Prescott St, Jersey City</div>
<a class="phone" href="tel:2016587295">201-658-7295</a>
</div>
<div style="text-align:right">
<div class="label">Receipt</div>
<div id="receipt">REC-001</div>
</div>
</div>

<div class="hr"></div>

<div class="row">
<div class="label">Date:</div>
<div id="date"></div>
</div>

<div class="row">
<div class="label">Client:</div>
<div id="client"></div>
</div>

<div class="row">
<div class="label">Car:</div>
<div id="car"></div>
</div>

<div class="hr"></div>

<div class="row">
<div>Auto Service</div>
<div id="amount"></div>
</div>

<div class="hr"></div>

<div class="row total">
<div>Total:</div>
<div id="total"></div>
</div>

<p style="text-align:center;margin-top:30px;color:#555">
Thank you for your business
</p>

</div>

<button class="btn print" onclick="window.print()">Print Receipt</button>
<button class="btn whatsapp" onclick="sendWhatsApp()">Send WhatsApp</button>
<button class="btn sms" onclick="sendSMS()">Send SMS</button>

</div>

<script>
document.getElementById("date").innerText = new Date().toLocaleString();

let client = "Yokairy Perez Mora";
let car = "Kia S 2023";
let amount = 500;

document.getElementById("client").innerText = client;
document.getElementById("car").innerText = car;
document.getElementById("amount").innerText = "$"+amount;
document.getElementById("total").innerText = "$"+amount;

function sendWhatsApp(){
let msg = `Car Auto Studio
Client: ${client}
Car: ${car}
Total: $${amount}`;
window.open("https://wa.me/?text="+encodeURIComponent(msg));
}

function sendSMS(){
let msg = `Car Auto Studio
Client: ${client}
Car: ${car}
Total: $${amount}`;
window.location.href="sms:?body="+encodeURIComponent(msg);
}
</script>

</body>
</html>
