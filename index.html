<!DOCTYPE html>
<html>
<head>
<title>Car Auto Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family: Arial;
background:#0f172a;
color:white;
margin:0;
}

.header{
text-align:center;
padding:20px;
background:#020617;
font-size:22px;
font-weight:bold;
}

.container{
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
font-weight:bold;
margin-top:10px;
}

.save{
background:#3b82f6;
color:white;
}

.print{
background:#f59e0b;
}

.whatsapp{
background:#25D366;
color:white;
}

.receipt{
background:white;
color:black;
padding:15px;
border-radius:10px;
margin-top:10px;
}
</style>
</head>

<body>

<div class="header">🚗 Car Auto Studio</div>

<div class="container">

<div class="card">
<h3>New Receipt</h3>
<input id="name" placeholder="Client name">
<input id="amount" placeholder="Amount">

<button class="save" onclick="saveReceipt()">Save Receipt</button>
</div>

<div class="card">
<h2>Total: $<span id="total">0</span></h2>

<button class="print" onclick="window.print()">Print</button>

<button class="whatsapp" onclick="sendWhatsApp()">Send via WhatsApp</button>
</div>

<div id="receipts"></div>

</div>

<script>
let total = 0;

function saveReceipt(){
let name = document.getElementById("name").value;
let amount = parseFloat(document.getElementById("amount").value);

if(!name || !amount) return;

total += amount;
document.getElementById("total").innerText = total;

let receipt = document.createElement("div");
receipt.className="receipt";

receipt.innerHTML = `
<h3>Car Auto Studio</h3>
<p><strong>Client:</strong> ${name}</p>
<p><strong>Amount:</strong> $${amount}</p>
<p><strong>Address:</strong> 20 Prescott St, Jersey City</p>
<p><strong>Phone:</strong> 201-658-7295</p>
<hr>
<p>Thank you for your business</p>
`;

document.getElementById("receipts").appendChild(receipt);

document.getElementById("name").value="";
document.getElementById("amount").value="";
}

function sendWhatsApp(){
let text = "Car Auto Studio Receipt - 20 Prescott St - 201-658-7295";
window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
}
</script>

</body>
</html>
