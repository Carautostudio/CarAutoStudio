<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Auto Studio</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI', Arial;
    background:#0b1220;
    color:white;
}

/* FORM */
.container{
    max-width:600px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    border-radius:8px;
    border:none;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    margin-bottom:10px;
}

.blue{background:#2563eb;color:white;}
.green{background:#22c55e;color:white;}
.gray{background:#6b7280;color:white;}
.orange{background:#f59e0b;color:white;}

/* RECEIPT */
.receipt{
    background:white;
    color:black;
    width:700px;
    margin:40px auto;
    padding:40px;
    border-radius:10px;
}

.header{
    display:flex;
    justify-content:space-between;
}

.line{
    border-bottom:1px solid #ddd;
    margin:15px 0;
}

/* PRINT */
@media print{
    body{
        background:white;
    }

    body *{
        visibility:hidden;
    }

    .receipt, .receipt *{
        visibility:visible;
    }

    .receipt{
        position:absolute;
        top:50%;
        left:50%;
        transform:translate(-50%,-50%);
        width:90%;
        max-width:800px;
        padding:60px;
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>🚗 Car Auto Studio</h1>

    <input type="text" id="client" placeholder="Client Name">
    <input type="text" id="car" placeholder="Car (ex: Honda Civic 2020)">
    <input type="number" id="amount" placeholder="Amount">

    <button class="blue" onclick="generateReceipt()">Generate Receipt</button>
    <button class="orange" onclick="printReceipt()">Print Receipt</button>
    <button class="green" onclick="sendWhatsApp()">Send via WhatsApp</button>
    <button class="gray" onclick="sendSMS()">Send via SMS</button>
</div>

<div id="receipt" class="receipt" style="display:none;">
    <div class="header">
        <div>
            <h2>🚗 Car Auto Studio</h2>
            <p>20 Prescott St, Jersey City</p>
            <p>201-658-7295</p>
        </div>
        <div>
            <strong>Receipt</strong><br>
            <span id="receiptNumber"></span>
        </div>
    </div>

    <div class="line"></div>

    <p><strong>Date:</strong> <span id="date"></span></p>
    <p><strong>Client:</strong> <span id="clientName"></span></p>
    <p><strong>Car:</strong> <span id="carName"></span></p>

    <div class="line"></div>

    <p>Auto Service <span style="float:right;" id="serviceAmount"></span></p>

    <div class="line"></div>

    <h2 style="text-align:right;">Total: <span id="total"></span></h2>

    <p style="text-align:center;">Thank you for your business</p>
</div>

<script>

function generateReceipt(){
    let client = document.getElementById("client").value;
    let car = document.getElementById("car").value;
    let amount = document.getElementById("amount").value;

    let date = new Date().toLocaleString();

    document.getElementById("receipt").style.display = "block";
    document.getElementById("clientName").innerText = client;
    document.getElementById("carName").innerText = car;
    document.getElementById("serviceAmount").innerText = "$" + amount;
    document.getElementById("total").innerText = "$" + amount;
    document.getElementById("date").innerText = date;
    document.getElementById("receiptNumber").innerText = "REC-" + Math.floor(Math.random()*1000);
}

function printReceipt(){
    window.print();
}

function sendWhatsApp(){
    let text = `Car Auto Studio Receipt\nClient: ${clientName.innerText}\nCar: ${carName.innerText}\nTotal: ${total.innerText}`;
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
}

function sendSMS(){
    let text = `Car Auto Studio Receipt - ${total.innerText}`;
    window.open(`sms:?body=${encodeURIComponent(text)}`);
}

</script>

</body>
</html>
