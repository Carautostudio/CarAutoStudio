<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Auto Studio</title>

<style>
body{
    font-family: 'Segoe UI', Arial;
    background:#0f172a;
    margin:0;
    padding:20px;
}

.container{
    max-width:600px;
    margin:auto;
}

.header{
    text-align:center;
    color:white;
    margin-bottom:20px;
}

.card{
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
}

.save{ background:#2563eb; color:white;}
.print{ background:#f59e0b; color:white;}
.whatsapp{ background:#22c55e; color:white;}

.receipt{
    margin-top:20px;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.top{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}

.line{
    border-bottom:1px solid #ddd;
    margin:15px 0;
}

.total{
    font-size:22px;
    font-weight:bold;
    text-align:right;
}

@media print{
    body *{
        visibility:hidden;
    }
    #printArea, #printArea *{
        visibility:visible;
    }
    #printArea{
        position:absolute;
        top:0;
        left:0;
        width:100%;
        padding:40px;
    }
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h2>🚗 Car Auto Studio</h2>
<p>20 Prescott St, Jersey City | 201-658-7295</p>
</div>

<div class="card">
<h3>Create Receipt</h3>

<input type="text" id="name" placeholder="Client name">
<input type="number" id="amount" placeholder="Amount">

<button class="save" onclick="createReceipt()">Save Receipt</button>
<button class="print" onclick="printReceipt()">Print Receipt</button>
<button class="whatsapp" onclick="sendWhatsApp()">Send via WhatsApp</button>
</div>

<div id="printArea"></div>

</div>

<script>

let count = 1;

function createReceipt(){

let name = document.getElementById("name").value;
let amount = document.getElementById("amount").value;

if(!name || !amount){
    alert("Fill everything");
    return;
}

let date = new Date().toLocaleString();

let html = `
<div class="receipt">

<div class="top">
<div>
<h2>Car Auto Studio</h2>
<p>20 Prescott St, Jersey City</p>
<p>Phone: 201-658-7295</p>
</div>

<div style="text-align:right;">
<strong>Receipt</strong><br>
REC-${count}
</div>
</div>

<div class="line"></div>

<p><strong>Date:</strong> ${date}</p>
<p><strong>Client:</strong> ${name}</p>

<div class="line"></div>

<p>Auto Service <span style="float:right;">$${amount}</span></p>

<div class="line"></div>

<div class="total">Total: $${amount}</div>

<p style="text-align:center;margin-top:20px;">
Thank you for your business
</p>

</div>
`;

document.getElementById("printArea").innerHTML = html;

count++;

document.getElementById("name").value="";
document.getElementById("amount").value="";
}

function printReceipt(){
window.print();
}

function sendWhatsApp(){
let text = document.getElementById("printArea").innerText;
window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
}

</script>

</body>
</html>
