<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Auto Studio</title>

<style>
body{
    font-family: 'Segoe UI', Arial;
    background:#0b1220;
    margin:0;
}

.container{
    display:flex;
    justify-content:center;
    padding:40px;
}

.receipt{
    background:white;
    width:700px;
    padding:30px;
    border-radius:10px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
}

.title{
    font-size:22px;
    font-weight:bold;
}

.small{
    color:#555;
    margin-top:5px;
}

/* LINE */
.line{
    border-top:1px solid #ddd;
    margin:20px 0;
}

/* ROWS */
.row{
    display:flex;
    justify-content:space-between;
    margin:8px 0;
}

.bold{
    font-weight:bold;
}

.total{
    font-size:20px;
    font-weight:bold;
    text-align:right;
    margin-top:20px;
}

/* FOOTER */
.footer{
    text-align:center;
    margin-top:30px;
    color:#555;
}

/* PRINT PERFECT */
@media print {
    body *{
        visibility:hidden;
    }

    .receipt, .receipt *{
        visibility:visible;
    }

    .receipt{
        position:absolute;
        left:0;
        top:0;
        width:100%;
        box-shadow:none;
        border-radius:0;
    }
}
</style>

</head>

<body>

<div class="container">
<div class="receipt" id="printArea">

    <div class="header">
        <div>
            <div class="title">Car Auto Studio</div>
            <div class="small">20 Prescott St, Jersey City</div>
            <div class="small">201-658-7295</div>
        </div>

        <div>
            <div class="bold">Receipt</div>
            <div>REC-1</div>
        </div>
    </div>

    <div class="line"></div>

    <div class="row">
        <div class="bold">Date:</div>
        <div id="date"></div>
    </div>

    <div class="row">
        <div class="bold">Client:</div>
        <div id="client">---</div>
    </div>

    <div class="line"></div>

    <div class="row">
        <div>Auto Service</div>
        <div id="amount">$0</div>
    </div>

    <div class="total" id="total">Total: $0</div>

    <div class="footer">Thank you for your business</div>

</div>
</div>

<script>
function createReceipt(){
    let name = prompt("Client name:");
    let amount = prompt("Amount:");

    document.getElementById("client").innerText = name;
    document.getElementById("amount").innerText = "$" + amount;
    document.getElementById("total").innerText = "Total: $" + amount;

    let now = new Date();
    document.getElementById("date").innerText = now.toLocaleString();

    window.print();
}
</script>

</body>
</html>
