<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Auto Studio</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0b1220;
  margin: 0;
}

/* CONTENEDOR */
.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

/* TARJETA */
.card {
  background: white;
  border-radius: 20px;
  padding: 25px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.4);
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: start;
}

.business {
  font-size: 22px;
  font-weight: bold;
}

.phone {
  color: #2563eb;
}

/* CAMPOS */
.row {
  display: flex;
  justify-content: space-between;
  margin: 10px 0;
}

input {
  border: none;
  border-bottom: 1px solid #ccc;
  text-align: right;
  outline: none;
  width: 60%;
}

/* TOTAL */
.total {
  font-size: 22px;
  font-weight: bold;
  text-align: right;
  margin-top: 15px;
}

/* BOTONES */
button {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 12px;
  margin-top: 10px;
  font-size: 16px;
  font-weight: bold;
}

.print { background: orange; color: white; }
.whatsapp { background: #25D366; color: white; }
.sms { background: #3b82f6; color: white; }

/* 🔥 PRINT FIX REAL */
@media print {
  body {
    background: white !important;
  }

  .container {
    padding: 0;
    margin: 0;
  }

  .card {
    box-shadow: none;
    border-radius: 0;
    margin: 0;
    width: 100%;
  }

  button {
    display: none;
  }

  html, body {
    height: auto;
  }

  @page {
    margin: 10mm;
  }
}
</style>
</head>

<body>

<div class="container">
  <div class="card" id="receipt">

    <div class="header">
      <div>
        <div class="business">🚗 Car Auto Studio</div>
        <div>20 Prescott St, Jersey City</div>
        <div class="phone">201-658-7295</div>
      </div>
      <div>
        <b>Receipt</b><br>
        <input placeholder="REC-001">
      </div>
    </div>

    <hr>

    <div class="row">
      <b>Date:</b>
      <input id="date">
    </div>

    <div class="row">
      <b>Client:</b>
      <input id="client" placeholder="Enter name">
    </div>

    <div class="row">
      <b>Vehicle:</b>
      <input id="car" placeholder="Car model">
    </div>

    <hr>

    <div class="row">
      <span>Service</span>
      <input id="service" placeholder="Oil change">
    </div>

    <div class="row">
      <span>Amount</span>
      <input id="amount" type="number" placeholder="0">
    </div>

    <div class="total">
      Total: $<span id="total">0</span>
    </div>

    <p style="text-align:center; margin-top:20px;">
      Thank you for your business
    </p>

  </div>

  <!-- BOTONES -->
  <button class="print" onclick="window.print()">Print Receipt</button>
  <button class="whatsapp" onclick="sendWhatsApp()">Send WhatsApp</button>
  <button class="sms" onclick="sendSMS()">Send SMS</button>

</div>

<script>
// fecha automática
document.getElementById("date").value = new Date().toLocaleString();

// actualizar total
document.getElementById("amount").addEventListener("input", function() {
  document.getElementById("total").innerText = this.value || 0;
});

// WhatsApp
function sendWhatsApp() {
  let text =
  "Car Auto Studio\n" +
  "Client: " + document.getElementById("client").value + "\n" +
  "Vehicle: " + document.getElementById("car").value + "\n" +
  "Service: " + document.getElementById("service").value + "\n" +
  "Total: $" + document.getElementById("amount").value;

  window.open("https://wa.me/?text=" + encodeURIComponent(text));
}

// SMS
function sendSMS() {
  let text =
  "Car Auto Studio - Receipt\n" +
  "Client: " + document.getElementById("client").value + "\n" +
  "Total: $" + document.getElementById("amount").value;

  window.open("sms:?&body=" + encodeURIComponent(text));
}
</script>

</body>
</html>
