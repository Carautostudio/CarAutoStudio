<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Auto Studio</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI', Arial;
    background:#0b1220;
    color:white;
}

/* FORM */
.container{
    max-width:500px;
    margin:auto;
    padding:20px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    border-radius:8px;
    border:none;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    margin-bottom:10px;
}

.blue{background:#2563eb;color:white;}
.green{background:#22c55e;color:white;}
.gray{background:#6b7280;color:white;}
.orange{background:#f59e0b;color:white;}

/* RECEIPT */
.receipt{
    display:none;
    width:800px;
    margin:auto;
    background:white;
    color:black;
    padding:40px;
    box-sizing:border-box;
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.title{
    font-size:22px;
    font-weight:bold;
}

.right{
    text-align:right;
}

/* LINE */
.line{
    border-bottom:1px solid #ddd;
    margin:15px 0;
}

/* ROW */
.row{
    display:flex;
    justify-content:space-between;
}

/* TOTAL */
.total{
    text-align:right;
    font-size:24px;
    font-weight:bold;
}

/* PRINT PERFECT (LLENA TODA LA HOJA) */
@media print{

    body{
        background:white;
    }

    body *{
        visibility:hidden;
    }

    .receipt, .receipt *{
        visibility:visible;
    }

    .receipt{
        position:absolute;
        top:0;
        left:0;
        width:100%;
        height:100%;
        padding:60px;
    }

}
</style>
</head>

<body>

<div class="container">
    <h2>🚗 Car Auto Studio</h2>

    <input type="text" id="client" placeholder="Client Name">
    <input type="text" id="car" placeholder="Car (Ex: Kia Seltos 2023)">
    <input type="number" id="amount" placeholder="Amount">

    <button class="blue" onclick="generate()">Generate Receipt</button>
    <button class="orange" onclick="printReceipt()">Print Receipt</button>
    <button class="green" onclick="sendWhatsApp()">Send WhatsApp</button>
    <button class="gray" onclick="sendSMS()">Send SMS</button>
</div>

<div id="receipt" class="receipt">

    <div class="header">
        <div>
            <div class="title">🚗 Car Auto Studio</div>
            <div>20 Prescott St, Jersey City</div>
            <div>201-658-7295</div>
        </div>

        <div class="right">
            <div><strong>Receipt</strong></div>
            <div id="receiptNum"></div>
        </div>
    </div>

    <div class="line"></div>

    <div class="row">
        <div>
            <div><strong>Date:</strong></div>
            <div><strong>Client:</strong></div>
            <div><strong>Car:</strong></div>
        </div>

        <div class="right">
            <div id="date"></div>
            <div id="clientName"></div>
            <div id="carName"></div>
        </div>
    </div>

    <div class="line"></div>

    <div class="row">
        <div>Auto Service</div>
        <div id="amountText"></div>
    </div>

    <div class="line"></div>

    <div class="total">
        Total: <span id="total"></span>
    </div>

    <div style="margin-top:100px; text-align:center;">
        Thank you for your business
    </div>

</div>

<script>

function generate(){
    let client = document.getElementById("client").value || "N/A";
    let car = document.getElementById("car").value || "N/A";
    let amount = document.getElementById("amount").value || "0";

    document.getElementById("receipt").style.display = "block";

    document.getElementById("clientName").innerText = client;
    document.getElementById("carName").innerText = car;
    document.getElementById("amountText").innerText = "$" + amount;
    document.getElementById("total").innerText = "$" + amount;
    document.getElementById("date").innerText = new Date().toLocaleString();

    document.getElementById("receiptNum").innerText = "REC-" + Math.floor(Math.random()*1000);
}

function printReceipt(){
    window.print();
}

function sendWhatsApp(){
    let text = `Car Auto Studio
Client: ${clientName.innerText}
Car: ${carName.innerText}
Total: ${total.innerText}`;

    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
}

function sendSMS(){
    let text = `Car Auto Studio Receipt - ${total.innerText}`;
    window.open(`sms:?body=${encodeURIComponent(text)}`);
}

</script>

</body>
</html>
