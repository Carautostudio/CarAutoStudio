<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Auto Studio</title>

<style>

body{
  font-family: 'Segoe UI', Arial;
  background:#0b1220;
  margin:0;
  color:white;
}

/* HEADER */
.header{
  background:#020617;
  padding:20px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  letter-spacing:1px;
}

/* FORM */
.container{
  max-width:500px;
  margin:auto;
  padding:15px;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:8px;
  border:none;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  margin-top:10px;
  font-size:16px;
}

.save{background:#2563eb;color:white;}
.print{background:#f59e0b;color:black;}
.whatsapp{background:#22c55e;color:white;}

/* RECEIPT DESIGN */
.receipt{
  background:white;
  color:black;
  border-radius:14px;
  padding:30px;
  max-width:700px;
  margin:30px auto;
  box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

.top{
  display:flex;
  justify-content:space-between;
}

.company{
  font-size:22px;
  font-weight:bold;
}

.meta{
  text-align:right;
  font-size:14px;
}

.line{
  border-top:1px solid #ddd;
  margin:15px 0;
}

.table{
  width:100%;
}

.table td{
  padding:6px 0;
}

.total{
  text-align:right;
  font-size:22px;
  font-weight:bold;
  margin-top:10px;
}

/* PRINT PERFECT */
@media print {

  body{
    background:white;
  }

  body *{
    visibility:hidden;
  }

  #printArea, #printArea *{
    visibility:visible;
  }

  #printArea{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    padding:40px;
  }

}

</style>
</head>

<body>

<div class="header">
🚗 CAR AUTO STUDIO
</div>

<div class="container">

<div class="card">
<h3>Create Receipt</h3>
<input id="name" placeholder="Client name">
<input id="amount" placeholder="Amount">
<button class="save" onclick="create()">Generate</button>
</div>

<div class="card">
<button class="print" onclick="printR()">Print</button>
<button class="whatsapp" onclick="sendWA()">WhatsApp</button>
</div>

<div id="result"></div>

</div>

<script>

let count = 1;
let last = {};

function create(){

  let name = document.getElementById("name").value;
  let amount = document.getElementById("amount").value;

  if(!name || !amount){
    alert("Fill fields");
    return;
  }

  let date = new Date().toLocaleString();
  let id = "REC-" + String(count).padStart(3,"0");

  last = {name, amount, date, id};

  document.getElementById("result").innerHTML = `
  <div class="receipt" id="printArea">

    <div class="top">
      <div>
        <div class="company">Car Auto Studio</div>
        <div>20 Prescott St, Jersey City</div>
        <div>201-658-7295</div>
      </div>

      <div class="meta">
        <div><strong>Receipt</strong></div>
        <div>${id}</div>
      </div>
    </div>

    <div class="line"></div>

    <table class="table">
      <tr>
        <td><strong>Date:</strong></td>
        <td style="text-align:right">${date}</td>
      </tr>
      <tr>
        <td><strong>Client:</strong></td>
        <td style="text-align:right">${name}</td>
      </tr>
    </table>

    <div class="line"></div>

    <table class="table">
      <tr>
        <td>Auto Service</td>
        <td style="text-align:right">$${amount}</td>
      </tr>
    </table>

    <div class="line"></div>

    <div class="total">Total: $${amount}</div>

    <p style="text-align:center; margin-top:20px;">
      Thank you for your business
    </p>

  </div>
  `;

  count++;

  document.getElementById("name").value="";
  document.getElementById("amount").value="";
}

function printR(){
  window.print();
}

function sendWA(){

  let text = `Car Auto Studio
Receipt ${last.id}
Client: ${last.name}
Amount: $${last.amount}`;

  window.open("https://wa.me/?text=" + encodeURIComponent(text));
}

</script>

</body>
</html>
