<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Auto Studio</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#0f172a;
    margin:0;
    color:white;
}

.container{
    max-width:500px;
    margin:auto;
    padding:20px;
}

.header{
    text-align:center;
    font-size:22px;
    font-weight:bold;
    background:#020617;
    padding:15px;
    border-radius:10px;
}

.form{
    background:#1e293b;
    padding:20px;
    margin-top:20px;
    border-radius:10px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:5px;
    font-weight:bold;
    cursor:pointer;
}

.save{ background:#3b82f6; color:white; }
.print{ background:#f59e0b; color:white; }
.whatsapp{ background:#22c55e; color:white; }

.receipt-box{
    background:white;
    color:black;
    margin-top:20px;
    padding:20px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

/* PRINT PERFECTO */
@media print {
    body *{
        visibility:hidden;
    }
    #printArea, #printArea *{
        visibility:visible;
    }
    #printArea{
        position:absolute;
        top:0;
        left:0;
        width:100%;
        background:white;
    }
}
</style>
</head>

<body>

<div class="container">

<div class="header">
🚗 Car Auto Studio  
📍 20 Prescott St, Jersey City  
📞 201-658-7295
</div>

<div class="form">
<h3>New Receipt</h3>

<input type="text" id="name" placeholder="Client name">
<input type="number" id="amount" placeholder="Amount">

<button class="save" onclick="createReceipt()">Save Receipt</button>

<h3 id="total">Total: $0</h3>

<button class="print" onclick="printReceipt()">Print Receipt</button>
<button class="whatsapp" onclick="sendWhatsApp()">Send via WhatsApp</button>

</div>

<div id="printArea"></div>

</div>

<script>

let total = 0;
let receiptNumber = 1;

function createReceipt(){

let name = document.getElementById("name").value;
let amount = parseFloat(document.getElementById("amount").value);

if(!name || !amount){
    alert("Fill all fields");
    return;
}

total += amount;
document.getElementById("total").innerText = "Total: $" + total;

let date = new Date().toLocaleString();

let receipt = `
<div class="receipt-box">
<h2>Car Auto Studio</h2>
<p>20 Prescott St, Jersey City</p>
<p>Phone: 201-658-7295</p>
<hr>

<p><strong>Receipt #:</strong> REC-${receiptNumber}</p>
<p><strong>Date:</strong> ${date}</p>
<p><strong>Client:</strong> ${name}</p>
<p><strong>Service:</strong> Auto Service</p>
<p><strong>Amount:</strong> $${amount}</p>

<hr>

<h2>Total: $${amount}</h2>

<p style="margin-top:20px;">Thank you for your business</p>
</div>
`;

document.getElementById("printArea").innerHTML = receipt;

receiptNumber++;

document.getElementById("name").value="";
document.getElementById("amount").value="";
}

function printReceipt(){
window.print();
}

function sendWhatsApp(){

let text = document.getElementById("printArea").innerText;

window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
}

</script>

</body>
</html>
